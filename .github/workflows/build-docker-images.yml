name: Build and Push Docker Images

on:
  push:
    branches:
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_ROOT: ghcr.io/${{ github.repository_owner }}/plugin-creator
  IMAGE_DOCS: ghcr.io/${{ github.repository_owner }}/plugin-creator-docs

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the creator
      - name: Build and push Root Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_ROOT }}:latest
            ${{ env.IMAGE_ROOT }}:${{ github.sha }}

      # Build the docs
      - name: Build and push Docs Image
        uses: docker/build-push-action@v5
        with:
          context: ./docs
          file: ./docs/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_DOCS }}:latest
            ${{ env.IMAGE_DOCS }}:${{ github.sha }}
